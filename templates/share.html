<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/style.css">
    <title>Curier 🚚</title>

    <style>
        body {
            overflow: hidden;
            height: 100vh;
        }

        .share-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            gap: 1.5rem;
        }

        .info-panel {
            background: var(--bg2);
            border: 1px solid var(--border);
            padding: 1.5rem 2rem;
            box-shadow: var(--shadow);
            min-width: 340px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            gap: 2rem;
            padding: 0.4rem 0;
            border-bottom: 1px solid var(--bg3);
            font-size: 0.9rem;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-key {
            color: var(--text-dim);
            white-space: nowrap;
        }

        .info-value {
            color: #ffffff;
            text-align: right;
            word-break: break-all;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            padding: 1rem;
            background: var(--bg);
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid var(--border);
        }

        .footer a:hover {
            border-color: var(--accent);
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const uploadDate = document.getElementById("uploadedAt")
            let date = new Date(parseInt(uploadDate.dataset.utc) * 1000)
            uploadDate.textContent = date.toLocaleString(undefined, { hour12: false })

            const expireDate = document.getElementById("expiresAt")
            date = new Date(parseInt(expireDate.dataset.utc) * 1000)
            expireDate.textContent = date.toLocaleString(undefined, { hour12: false })

            const fileSize = document.getElementById("fileSize")
            const bytes = parseInt(fileSize.dataset.bytes)

            let unit = "unset"
            let displaySize = -1
            if (bytes < 1024) {
                unit = "bytes"
                displaySize = bytes
            } else if (bytes < 1024 * 1024) {
                unit = "KB"
                displaySize = bytes / 1024
            } else if (bytes < 1024 * 1024 * 1024) {
                unit = "MB"
                displaySize = bytes / 1024 / 1024
            } else {
                unit = "GB"
                displaySize = bytes / 1024 / 1024 / 1024
            }

            fileSize.textContent = displaySize.toFixed(1) + " " + unit
        })
    </script>
</head>
<body>
    <div class="share-area">
        <h1>The curier 🚚 has arrived!</h1>

        <div class="info-panel">
            <div class="info-row">
                <span class="info-key">File name</span>
                <span class="info-value">{{.OriginalFilename}}</span>
            </div>
            <div class="info-row">
                <span class="info-key">File size</span>
                <span class="info-value" id="fileSize" data-bytes="{{.FileSize}}"></span>
            </div>
            <div class="info-row">
                <span class="info-key">Uploaded at</span>
                <span class="info-value" id="uploadedAt" data-utc="{{.UploadedAt.UTC.Unix}}"></span>
            </div>
            <div class="info-row">
                <span class="info-key">Expires at</span>
                <span class="info-value" id="expiresAt" data-utc="{{.ExpiresAt.UTC.Unix}}"></span>
            </div>
        </div>

        <a href="/download/{{.ID}}">
            <button>Download now</button>
        </a>
    </div>

    <div class="footer">
        Want to share a file too? <a href="/">Go to the homepage</a>
    </div>
</body>
</html>
