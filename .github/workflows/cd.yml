name: CD

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Verify tag is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor ${{ github.sha }} origin/main || (echo "Tag must be on main" && exit 1)

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build Linux
        run: GOOS=linux GOARCH=amd64 go build -o curier .

      - name: Build Windows
        run: GOOS=windows GOARCH=amd64 go build -o curier.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            curier
            curier.exe
  
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}