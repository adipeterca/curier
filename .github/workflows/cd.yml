name: CD

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build Linux
        run: GOOS=linux GOARCH=amd64 go build -o curier .

      - name: Build Windows
        run: GOOS=windows GOARCH=amd64 go build -o curier.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            curier
            curier.exe