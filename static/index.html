<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Curier 🚚</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 1rem;
        }

        .file-label {
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            box-shadow: var(--shadow);
            display: inline-block;
        }

        .file-label:hover {
            background: var(--btn-hover);
        }

        #fileInput {
            display: none;
        }

        #fileName {
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        #result {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        #copyBtn {
            display: none;
        }
    </style>
</head>
<body>
    <div class="upload-area">
        <h1>Curier 🚚</h1>
        <p class="label">Max file size: <span id="maxFileSize">...</span></p>

        <label class="file-label" for="fileInput">[ Choose a file ]</label>
        <input type="file" id="fileInput">
        <span id="fileName" class="label">No file selected</span>

        <button id="uploadBtn" onclick="upload()" disabled>Upload</button>

        <div id="result">
            <p class="label">File uploaded successfully</p>
            <button id="copyBtn" onclick="copyLink()">Click here to copy!</button>
        </div>
    </div>

    <script>
        let config = null
        let uploadedUrl = null

        document.getElementById("fileInput").addEventListener("change", () => {
            const file = document.getElementById("fileInput").files[0]
            document.getElementById("uploadBtn").disabled = !file
            document.getElementById("fileName").textContent = file ? file.name : "No file selected"
        })

        document.addEventListener("DOMContentLoaded", async () => {
            const response = await fetch("/config")
            config = await response.json()

            let unit, displaySize
            if (config.max_file_size < 1024) {
                unit = "bytes"
                displaySize = config.max_file_size
            } else if (config.max_file_size < 1024 * 1024) {
                unit = "KB"
                displaySize = config.max_file_size / 1024
            } else if (config.max_file_size < 1024 * 1024 * 1024) {
                unit = "MB"
                displaySize = config.max_file_size / 1024 / 1024
            } else {
                unit = "GB"
                displaySize = config.max_file_size / 1024 / 1024 / 1024
            }

            document.getElementById("maxFileSize").textContent = displaySize.toFixed(1) + " " + unit
        })

        async function upload() {
            const file = document.getElementById("fileInput").files[0]

            if (!file) {
                alert("Please select a file")
                return
            }

            if (config && file.size > config.max_file_size) {
                alert("File too large")
                return
            }

            const ext = "." + file.name.split(".").pop().toLowerCase()
            if (config && !config.allowed_extensions.includes(ext)) {
                alert("File type not allowed")
                return
            }

            const formData = new FormData()
            formData.append("file", file)

            try {
                const response = await fetch("/upload", {
                    method: "POST",
                    body: formData
                })

                if (!response.ok) {
                    alert("Upload failed")
                    return
                }

                const data = await response.json()
                uploadedUrl = window.location.origin + data.path

                document.getElementById("result").style.display = "flex"
                document.getElementById("copyBtn").style.display = "inline-block"
            } catch (err) {
                alert("Upload failed")
            }
        }

        function copyLink() {
            navigator.clipboard.writeText(uploadedUrl).then(() => {
                const btn = document.getElementById("copyBtn")
                const original = btn.textContent
                btn.textContent = "Copied!"
                setTimeout(() => btn.textContent = original, 2000)
            })
        }
    </script>
</body>
</html>
